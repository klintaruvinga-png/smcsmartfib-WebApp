name: 03 - Autonomous Review Loop

# DISABLED — auto-trigger removed 2026-05-22.
#
# This workflow previously used anthropics/claude-code-action@v1 to apply
# P1/P2/P3 review fixes automatically after a Codex PR review was submitted.
# That action requires ANTHROPIC_API_KEY or CLAUDE_CODE_OAUTH_TOKEN (paid
# Claude API access), which is not available in this setup.
#
# Replacement: Local Claude Code is the review-fix path.
# After Codex opens a PR, run the review fix stage locally:
#   1. The pipeline watcher writes reports/codex-review.json (PR review data).
#   2. Open Claude Code and say: "Review PR #<N> and apply fixes"
#   3. Claude Code reads .github/prompts/claude-remediate-prompt.md,
#      reports/codex-review.json, and reports/review-event.json,
#      applies P1/P2/P3 fixes, commits, and pushes to the branch.
#
# This workflow is kept as workflow_dispatch so it can be re-enabled later
# if CLAUDE_CODE_OAUTH_TOKEN is added to repo secrets.

on:
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  disabled:
    runs-on: ubuntu-latest
    steps:
      - name: Explain disabled state
        run: |
          echo "03 - Autonomous Review Loop is intentionally disabled."
          echo "Review fixes are applied via local Claude Code, not the cloud action."
          echo "See .github/prompts/claude-remediate-prompt.md for the fix protocol."
          echo "Re-enable by restoring the pull_request_review trigger and setting"
          echo "CLAUDE_CODE_OAUTH_TOKEN in repository secrets."
