name: 02 - Implementation Artifact Transport

on:
  push:
    paths:
      - reports/codex-plan.md

permissions:
  contents: read

concurrency:
  group: implementation-transport-${{ github.ref }}
  cancel-in-progress: true

jobs:
  transport:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Validate implementation artifact
        run: test -f reports/codex-plan.md

      - name: Upload implementation artifact
        uses: actions/upload-artifact@v4
        with:
          name: codex-plan-${{ github.sha }}
          path: reports/codex-plan.md
          if-no-files-found: error
          retention-days: 14
