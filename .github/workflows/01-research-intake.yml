name: 01 - Research Intake

on:
  workflow_dispatch:
    inputs:
      issue_description:
        description: Paste the raw issue description or start with "SMC_ISSUE:"
        required: true
        type: string

permissions:
  contents: write

jobs:
  research:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Copilot CLI
        run: npm install -g @github/copilot

      - name: Prepare issue and research prompt
        env:
          ISSUE_INPUT: ${{ inputs.issue_description }}
        run: |
          mkdir -p reports
          printf '%s\n' "$ISSUE_INPUT" > reports/issue-raw.txt
          python - <<'PY'
          import os
          from pathlib import Path

          issue = os.environ["ISSUE_INPUT"]
          if issue.startswith("SMC_ISSUE:"):
              issue = issue.split("SMC_ISSUE:", 1)[1].lstrip()

          prompt_path = Path(".github/prompts/copilot-research-prompt.md")
          prompt = prompt_path.read_text(encoding="utf-8")
          rendered = prompt.replace("[[ISSUE_INPUT]]", issue)
          Path("reports/copilot-research-request.md").write_text(rendered, encoding="utf-8")
          PY

      - name: Generate research report with Copilot CLI
        env:
          COPILOT_GITHUB_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          copilot -p "$(cat reports/copilot-research-request.md)" \
            --allow-tool='shell(git:*)' \
            --allow-tool='shell(ls:*)' \
            --allow-tool='shell(find:*)' \
            --allow-tool='shell(cat:*)' \
            --allow-tool='shell(rg:*)' \
            --allow-tool=write \
            --no-ask-user > reports/copilot-research.md

      - name: Upload research artifacts
        uses: actions/upload-artifact@v4
        with:
          name: research-intake
          path: |
            reports/issue-raw.txt
            reports/copilot-research-request.md
            reports/copilot-research.md

      - name: Commit research artifacts
        run: |
          git config user.email "bot@superfib.local"
          git config user.name "SuperFIB Bot"
          git add reports/issue-raw.txt reports/copilot-research-request.md reports/copilot-research.md
          git diff --cached --quiet && exit 0
          git commit -m "chore: add research intake artifacts [skip ci]"
          git push origin HEAD:${GITHUB_REF_NAME}
