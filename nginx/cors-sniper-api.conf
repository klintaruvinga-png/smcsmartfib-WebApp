# SMC SuperFIB - Nginx CORS preflight for /wp-json/sniper/v1/*
#
# Alternative to the Cloudflare Worker approach. Use this only if direct
# Nginx/OpenResty config access is available on trader.stokvelsociety.co.za.
#
# Put the map block in http {}, and the location block in the server {} that
# handles trader.stokvelsociety.co.za. Validate with: nginx -t && systemctl reload nginx

map $http_origin $smc_sniper_cors_origin {
    default "";
    "https://smcsmartfib.lovable.app" $http_origin;
    "https://trader.stokvelsociety.co.za" $http_origin;
    "https://smcsuperfibwebapp.klintaruvinga.workers.dev" $http_origin;
    "https://id-preview--97eda4a2-efed-4b50-8b90-e9ac49043f57.lovable.app" $http_origin;
    "http://localhost:5173" $http_origin;
    "http://127.0.0.1:5173" $http_origin;
    "http://localhost:5174" $http_origin;
    "http://127.0.0.1:5174" $http_origin;
    "~^https://[0-9a-f-]+\.lovableproject\.com$" $http_origin;
    "~^https://id-preview--[0-9a-z-]+\.lovable\.app$" $http_origin;
}

location ^~ /wp-json/sniper/v1/ {
    if ($request_method = OPTIONS) {
        add_header Access-Control-Allow-Origin $smc_sniper_cors_origin always;
        add_header Access-Control-Allow-Credentials "true" always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-WP-Nonce, X-Requested-With, X-SMC-Token, X-SMC-Auth, X-Sniper-Secret, X-EA-API-Key, X-API-KEY" always;
        add_header Access-Control-Max-Age 86400 always;
        add_header Vary "Origin" always;
        add_header Content-Length 0 always;
        return 204;
    }

    try_files $uri $uri/ /index.php?$args;
}
